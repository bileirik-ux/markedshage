/* ---- EXCEL IMPORT ---- */
let pendingImport = null;

function parseImportDate(val) {
  if (!val && val !== 0) return '';
  // Excel serial date number (e.g. 46068) — convert to DD-MM-YYYY
  if (typeof val === 'number') {
    const date = XLSX.SSF.parse_date_code(val);
    if (date) {
      const dd = String(date.d).padStart(2,'0');
      const mm = String(date.m).padStart(2,'0');
      return `${dd}-${mm}-${date.y}`;
    }
  }
  const s = String(val).trim();
  // Accept DD.MM.YYYY, DD-MM-YYYY, or DD/MM/YYYY
  const m = s.match(/^(\d{1,2})[.\-\/](\d{1,2})[.\-\/](\d{4})$/);
  if (m) return `${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}-${m[3]}`;
  return s;
}

function parseStatus(label) {
  const map = {
    'Planlagt':'planlagt','Sådd':'sådd',
    'Spiret':'plantet','Plantet':'plantet',
    'I vekst':'i_produksjon','I produksjon':'i_produksjon',
    'Høstet':'høstet'
  };
  return map[label] || 'planlagt';
}

function parsePriority(label) {
  const map = {'Høy':'høy','Middels':'middels','Lav':'lav'};
  return map[label] || 'middels';
}

function importFromExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  importFileObject(file);
}

function saveToLocal() {
  try {
    const data = {
      crops,
      tasks: tasks.filter(t => !String(t.id).startsWith('crop-')),
      bedSizes,
      bedIDs: BED_IDS,
      saved: new Date().toISOString(),
    };
    localStorage.setItem('mh_data', JSON.stringify(data));
  } catch(e) { console.warn('localStorage save failed:', e); }
}

function loadFromLocal() {
  try {
    const raw = localStorage.getItem('mh_data');
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (data.crops) crops = data.crops;
    if (data.tasks) tasks = data.tasks;
    if (data.bedSizes) bedSizes = data.bedSizes;
    if (data.bedIDs && data.bedIDs.length) BED_IDS = data.bedIDs;
    return true;
  } catch(e) { return false; }
}


function importFileObject(file, skipSave = false) {
  return new Promise((resolve) => {
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array', cellDates: false });

      // ── Parse Vekster ──
      const wsV = wb.Sheets['Vekster'];
      const newCrops = [];
      if (wsV) {
        const rows = XLSX.utils.sheet_to_json(wsV, { header: 1 });
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r[0]) continue; // skip empty rows
          newCrops.push({
            id: Date.now() + i,
            name:         String(r[0] || ''),
            emoji:        String(r[1] || '🌱'),
            family:       String(r[2] || ''),
            status:       parseStatus(String(r[3] || '')),
            beds:         String(r[4] || '').split(',').map(s => s.trim()).filter(Boolean),
            rowSpacing:   parseFloat(r[5]) || 30,
            plantSpacing: parseFloat(r[6]) || 20,
            rows:         parseInt(r[7])   || 2,
            seedsPerCluster: parseInt(r[8]) || 1,
            // col 9 = antall planter (calculated), col 10 = estimert verdi (calculated), skip both
            sownDate:     parseImportDate(r[13]),
            sowLog:       parseImportDate(r[14]),
            plantedDate:  parseImportDate(r[15]),
            plantLog:     parseImportDate(r[16]),
            notes:        String(r[17] || ''),
            pricePerKg:   parseFloat(r[11]) || 0,
            weightG:      parseFloat(r[12]) || 0,
          });
        }
      }

      // ── Parse Senger (sizes + crop assignments) ──
      const wsS = wb.Sheets['Senger'];
      const newBedSizes = {};
      const newBedIDs = [];
      const bedToCropName = {}; // bedId -> crop name from Senger sheet
      if (wsS) {
        const rows = XLSX.utils.sheet_to_json(wsS, { header: 1 });
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          const bedId = String(r[0] || '').trim();
          if (!bedId) continue;
          newBedIDs.push(bedId);
          newBedSizes[bedId] = {
            length: parseFloat(r[1]) || 11,
            width:  parseFloat(r[2]) || 1.2,
          };
          if (r[4]) bedToCropName[bedId] = String(r[4]).trim();
        }
      }
      // Fall back to default beds if sheet was empty
      if (newBedIDs.length === 0) {
        BED_IDS.forEach(id => { newBedIDs.push(id); newBedSizes[id] = { length: 11, width: 1.2 }; });
      }

      // Assign beds to crops: if a crop has no beds from Vekster col 4,
      // collect all beds from Senger that name this crop
      const cropNameToBeds = {};
      Object.entries(bedToCropName).forEach(([bedId, cropName]) => {
        if (!cropNameToBeds[cropName]) cropNameToBeds[cropName] = [];
        cropNameToBeds[cropName].push(bedId);
      });
      newCrops.forEach(c => {
        if (c.beds.length === 0 && cropNameToBeds[c.name]) {
          c.beds = cropNameToBeds[c.name];
        }
      });

      // ── Parse Oppgaver ──
      const wsO = wb.Sheets['Oppgaver'];
      const newTasks = [];
      if (wsO) {
        const rows = XLSX.utils.sheet_to_json(wsO, { header: 1 });
        for (let i = 1; i < rows.length; i++) {
          const r = rows[i];
          if (!r[0]) continue;
          newTasks.push({
            id:       Date.now() + 1000 + i,
            text:     String(r[0] || ''),
            date:     parseImportDate(r[1]),
            priority: parsePriority(String(r[2] || '')),
            done:     String(r[3] || '').toLowerCase() === 'ja',
          });
        }
      }

      pendingImport = { crops: newCrops, bedSizes: newBedSizes, bedIDs: newBedIDs, tasks: newTasks };
      confirmImport(skipSave);
      resolve();
    } catch(err) {
      alert('Kunne ikke lese filen. Kontroller at det er en gyldig Excel-eksport fra denne appen.');
      console.error(err);
      resolve();
    }
  };
  reader.readAsArrayBuffer(file);
  });
}

function confirmImport(skipSave = false) {
  if (!pendingImport) return;
  snapshot(skipSave);
  crops    = pendingImport.crops;
  bedSizes = pendingImport.bedSizes;
  BED_IDS  = pendingImport.bedIDs;
  tasks    = pendingImport.tasks;
  pendingImport = null;
  selectedBed = null;
  saveToLocal(); // always save — data is now correct regardless of source
  closeModal('modal-import');
  render();
}

/* ---- EXCEL EXPORT ---- */
function fmtDate(d) {
  if (!d) return '';
  return d.replace(/-/g, '.');
}

function buildWorkbook() {
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Vekster ──────────────────────────────────────────
  const cropHeaders = [
    'Navn', 'Emoji', 'Sort', 'Status', 'Senger',
    'Radavstand (cm)', 'Planteavstand (cm)', 'Rader', 'Frø per klynge',
    'Antall planter totalt', 'Estimert verdi (kr)',
    'Pris pr/kg (kr)', 'Vekt per enhet (g)',
    'Sådato', 'Sålogg (dato)', 'Plantedato', 'Plantelogg (dato)', 'Notater'
  ];
  const cropRows = crops.map(c => [
    c.name, c.emoji, c.family,
    STATUS[c.status]?.label || c.status,
    c.beds.join(', '),
    c.rowSpacing, c.plantSpacing, c.rows, c.seedsPerCluster || 1,
    calcPlants(c),
    calcValue(c) !== null ? calcValue(c) : '',
    c.pricePerKg || '', c.weightG || '',
    fmtDate(c.sownDate), fmtDate(c.sowLog), fmtDate(c.plantedDate), fmtDate(c.plantLog), c.notes
  ]);
  const wsVekster = XLSX.utils.aoa_to_sheet([cropHeaders, ...cropRows]);
  wsVekster['!cols'] = [
    {wch:18},{wch:7},{wch:16},{wch:14},{wch:12},
    {wch:16},{wch:18},{wch:8},{wch:16},{wch:20},{wch:20},
    {wch:14},{wch:16},
    {wch:14},{wch:16},{wch:14},{wch:18},{wch:30}
  ];
  styleHeaderRow(wsVekster, cropHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsVekster, 'Vekster');

  // ── Sheet 2: Senger ───────────────────────────────────────────
  const bedHeaders = [
    'Seng', 'Lengde (m)', 'Bredde (m)', 'Areal (m²)',
    'Vekst', 'Status', 'Antall planter', 'Sådato', 'Plantedato'
  ];
  const bedRows = BED_IDS.map(id => {
    const bs = bedSizes[id];
    const crop = getBedCrop(id);
    return [
      id,
      bs.length, bs.width,
      +(bs.length * bs.width).toFixed(2),
      crop ? crop.name : '–',
      crop ? (STATUS[crop.status]?.label || crop.status) : '–',
      crop ? calcPlants({...crop, beds:[id]}) : 0,
      crop ? fmtDate(crop.sownDate) : '–',
      crop ? fmtDate(crop.plantedDate) : '–',
    ];
  });
  const wsSenger = XLSX.utils.aoa_to_sheet([bedHeaders, ...bedRows]);
  wsSenger['!cols'] = [
    {wch:8},{wch:12},{wch:12},{wch:12},
    {wch:18},{wch:12},{wch:16},{wch:14},{wch:14}
  ];
  styleHeaderRow(wsSenger, bedHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsSenger, 'Senger');

  // ── Sheet 3: Oppgaver ─────────────────────────────────────────
  const taskHeaders = ['Oppgave', 'Dato', 'Prioritet', 'Ferdig'];
  const taskRows = tasks.map(t => [
    t.text, fmtDate(t.date),
    t.priority.charAt(0).toUpperCase() + t.priority.slice(1),
    t.done ? 'Ja' : 'Nei'
  ]);
  const wsOppgaver = XLSX.utils.aoa_to_sheet([taskHeaders, ...taskRows]);
  wsOppgaver['!cols'] = [{wch:40},{wch:14},{wch:12},{wch:8}];
  styleHeaderRow(wsOppgaver, taskHeaders.length);
  XLSX.utils.book_append_sheet(wb, wsOppgaver, 'Oppgaver');

  // ── Download ──────────────────────────────────────────────────
  const date = new Date();
  const dateStr = `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`;
  return wb;
}

function exportToExcel() {
  const wb = buildWorkbook();
  const date = new Date();
  const dateStr = `${String(date.getDate()).padStart(2,'0')}-${String(date.getMonth()+1).padStart(2,'0')}-${date.getFullYear()}`;
  XLSX.writeFile(wb, `Markedshage_${dateStr}.xlsx`);
}

function styleHeaderRow(ws, numCols) {
  // Style header cells with green background
  for (let col = 0; col < numCols; col++) {
    const cellRef = XLSX.utils.encode_cell({r:0, c:col});
    if (!ws[cellRef]) continue;
    ws[cellRef].s = {
      font: { bold: true, color: { rgb: 'FFFFFF' } },
      fill: { fgColor: { rgb: '1A5C2E' } },
      alignment: { horizontal: 'left' }
    };
  }
}

const JSONBIN_API = 'https://api.jsonbin.io/v3/b';

let gistToken     = null;  // reused for JSONBin master key
let gistId        = null;  // reused for JSONBin bin ID
let gistConnected = false;
let gistSaveTimer = null;

function initGist() {
  try {
    gistToken     = localStorage.getItem('mh_sync_key') || localStorage.getItem('mh_gist_token') || null;
    gistId        = localStorage.getItem('mh_sync_id')  || localStorage.getItem('mh_gist_id')    || null;
    gistConnected = !!gistToken;
  } catch(e) {}
  renderGistBtn();
  if (gistConnected) gistLoadOnStart();
}

function renderGistBtn() {
  const btn = document.getElementById('gist-btn');
  if (!btn) return;
  btn.style.color = gistConnected ? '#34d399' : '#6b7280';
}

function gistSetup() {
  const existing = gistToken || '';
  const key = prompt(
    'JSONBin.io Master Key\n\n' +
    'Slik oppretter du en nøkkel:\n' +
    '1. Gå til jsonbin.io og lag en gratis konto\n' +
    '2. Gå til API Keys-siden\n' +
    '3. Kopier Master Key og lim inn her:',
    existing
  );
  if (!key || !key.trim()) return;
  gistToken = key.trim();
  gistConnected = true;
  try { localStorage.setItem('mh_sync_key', gistToken); } catch(e) {}
  try { localStorage.removeItem('mh_data'); } catch(e) {}
  gistId = null;
  try { localStorage.removeItem('mh_sync_id'); } catch(e) {}
  renderGistBtn();
  gistLoadOnStart();
}

async function gistLoadOnStart() {
  try {
    const hasLocal = !!localStorage.getItem('mh_data');
    if (hasLocal) {
      showSyncToast('☁ Tilkoblet JSONBin');
      return;
    }
    if (!gistId) {
      showSyncToast('☁ Tilkoblet JSONBin (ingen data ennå)');
      await gistSave();
      return;
    }
    const resp = await fetch(`${JSONBIN_API}/${gistId}/latest`, {
      headers: { 'X-Master-Key': gistToken, 'X-Bin-Meta': 'false' }
    });
    if (!resp.ok) { showSyncToast('☁ Tilkoblet JSONBin'); return; }
    const parsed = await resp.json();
    if (!parsed.xlsx) { showSyncToast('☁ Tilkoblet JSONBin'); return; }
    const binary = atob(parsed.xlsx);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    await importFileObject(new File([blob], 'markedshage.xlsx'), true);
    clearTimeout(gistSaveTimer); gistSaveTimer = null;
    showSyncToast('☁ Lastet inn fra JSONBin');
  } catch(e) {
    console.warn('JSONBin load failed:', e);
    showSyncToast('☁ Tilkoblet JSONBin (offline modus)');
  }
}

async function gistFindExisting() {
  return null; // not used with JSONBin
}

async function gistImport(silent = false) {
  if (!gistToken || !gistId) return false;
  try {
    const resp = await fetch(`${JSONBIN_API}/${gistId}/latest`, {
      headers: { 'X-Master-Key': gistToken, 'X-Bin-Meta': 'false' }
    });
    if (!resp.ok) return false;
    const parsed = await resp.json();
    if (!parsed.xlsx) return false;
    const binary = atob(parsed.xlsx);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    await importFileObject(new File([blob], 'markedshage.xlsx'), true);
    if (!silent) showSyncToast('☁ Lastet inn fra JSONBin');
    return true;
  } catch(e) { return false; }
}



function parseTasksFromSheet(wsO) {
  if (!wsO) return [];
  const rows = XLSX.utils.sheet_to_json(wsO, { header: 1 });
  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0]) continue;
    result.push({
      text:     String(r[0] || ''),
      date:     parseImportDate(r[1]),
      priority: parsePriority(String(r[2] || '')),
      done:     String(r[3] || '').toLowerCase() === 'ja',
    });
  }
  return result;
}

async function gistSave() {
  if (!gistToken) return;
  const wb = buildWorkbook();
  const wbArray = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
  let binary = '';
  const bytes = new Uint8Array(wbArray);
  for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
  const b64 = btoa(binary);
  const payload = JSON.stringify({ xlsx: b64, saved: new Date().toISOString() });
  try {
    let resp;
    if (gistId) {
      resp = await fetch(`${JSONBIN_API}/${gistId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': gistToken },
        body: payload
      });
    } else {
      resp = await fetch(JSONBIN_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': gistToken, 'X-Bin-Name': 'markedshage', 'X-Bin-Private': 'true' },
        body: payload
      });
      if (resp.ok) {
        const data = await resp.json();
        gistId = data.metadata?.id || data.record?.id || data.id;
        try { localStorage.setItem('mh_sync_id', gistId); } catch(e) {}
      }
    }
    if (resp && resp.ok) {
      showSyncToast('☁ Lagret til JSONBin');
      gistSaveTimer = null;
      const btn = document.getElementById('gist-btn');
      if (btn) { btn.style.color = '#34d399'; btn.title = 'JSONBin synkronisering'; }
    } else {
      showSyncToast('⚠ Lagring feilet');
    }
  } catch(e) {
    console.warn('JSONBin save error:', e);
  }
}

function scheduleGistSave() {
  if (!gistConnected) return;
  saveToLocal(); // save immediately to localStorage
  clearTimeout(gistSaveTimer);
  const btn = document.getElementById('gist-btn');
  if (btn) { btn.style.color = '#fbbf24'; btn.title = 'Ulagrede endringer – lagrer snart...'; }
  gistSaveTimer = setTimeout(gistSave, 3000);
}

// Save immediately if user closes/navigates away with pending changes
window.addEventListener('beforeunload', () => {
  if (gistConnected && gistSaveTimer) {
    clearTimeout(gistSaveTimer);
    gistSave();
  }
});

function gistShowMenu() {
  let menu = document.getElementById('gist-menu');
  if (menu) { menu.remove(); return; }
  menu = document.createElement('div');
  menu.id = 'gist-menu';
  menu.style.cssText = 'position:fixed;background:#1a2e1a;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:6px;min-width:200px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.5)';

  const items = [
    { label: '⬇ Last inn fra JSONBin', fn: () => { localStorage.removeItem('mh_data'); gistLoadOnStart(); menu.remove(); } },
    { label: '⬆ Lagre til JSONBin',    fn: () => { gistSave();   menu.remove(); } },
    { label: '─────────────────', fn: null },
    { label: '🔑 Endre token',         fn: () => { gistSetup();  menu.remove(); } },
    { label: '🔓 Koble fra',           fn: () => { gistDisconnect(); menu.remove(); }, color: '#f87171' },
  ];

  items.forEach(item => {
    if (!item.fn) {
      const div = document.createElement('div');
      div.style.cssText = 'height:1px;background:rgba(255,255,255,0.08);margin:4px 0';
      menu.appendChild(div);
      return;
    }
    const btn = document.createElement('button');
    btn.textContent = item.label;
    btn.style.cssText = `display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:transparent;color:${item.color||'#60a5fa'};cursor:pointer;font-size:13px;font-family:inherit;text-align:left`;
    btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.06)';
    btn.onmouseout  = () => btn.style.background = 'transparent';
    btn.onclick = item.fn;
    menu.appendChild(btn);
  });

  // Hidden file input for Excel import
  let fileInput = document.getElementById('gist-excel-import');
  if (!fileInput) {
    fileInput = document.createElement('input');
    fileInput.type = 'file'; fileInput.accept = '.xlsx'; fileInput.id = 'gist-excel-import';
    fileInput.style.display = 'none';
    fileInput.onchange = (e) => importFromExcel(e);
    document.body.appendChild(fileInput);
  }

  document.body.appendChild(menu);
  const gistBtn = document.getElementById('gist-btn');
  const rect = gistBtn.getBoundingClientRect();
  menu.style.top   = (rect.bottom + 4) + 'px';
  menu.style.right = (window.innerWidth - rect.right) + 'px';
}

function gistDisconnect() {
  gistToken = null; gistId = null; gistConnected = false;
  try { localStorage.removeItem('mh_gist_token'); localStorage.removeItem('mh_gist_id'); } catch(e) {}
  renderGistBtn();
  showSyncToast('Koblet fra JSONBin');
}

function showSyncToast(msg) {
  let t = document.getElementById('sync-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'sync-toast';
    t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a2e1a;border:1px solid rgba(52,211,153,0.3);border-radius:20px;padding:8px 16px;font-size:12px;color:#6ee7b7;z-index:9999;pointer-events:none;transition:opacity 0.3s;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}
