<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1a0e">
<meta name="description" content="Planleggingsverktøy for markedshage">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<title>Markedshage Assistenten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d1a0e 0%, #1a2e1b 40%, #0d1a0e 100%) fixed;
    background-size: 100% 100%;
    font-family: Georgia, 'Times New Roman', serif;
    color: #e8f5e9;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,26,14,0.92);
    backdrop-filter: blur(12px);
    padding: 14px 16px 14px;
    border-bottom: 1px solid rgba(52,211,153,0.1);
  }
  .header-top { margin-bottom: 0; }
  .header-eyebrow { font-size: 10px; letter-spacing: 0.3em; color: #6ee7b7; text-transform: uppercase; margin-bottom: 2px; }
  h1 { font-size: 20px; font-weight: 400; color: #d1fae5; }

  /* BOTTOM NAV */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(13,26,14,0.98);
    backdrop-filter: blur(12px);
    border-top: 1px solid rgba(52,211,153,0.15);
    display: flex;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex: 1; min-width: 0; padding: 20px 2px 18px;
    border: none; background: transparent;
    color: #4b5563; font-size: 13px; font-weight: 600; font-family: inherit;
    cursor: pointer; border-top: 3px solid transparent;
    transition: all 0.2s; letter-spacing: 0.04em;
  }
  .tab-btn.active { color: #6ee7b7; border-top-color: #34d399; }

  /* MAIN */
  main { padding: 16px; max-width: 600px; margin: 0 auto; padding-bottom: 110px; }

  /* STAT CARDS */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 16px;
  }
  .stat-icon { font-size: 20px; margin-bottom: 6px; }
  .stat-val { font-size: 30px; font-weight: 300; line-height: 1; }
  .stat-label { font-size: 10px; color: #9ca3af; margin-top: 4px; letter-spacing: 0.08em; text-transform: uppercase; }

  /* CARDS */
  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 16px; margin-bottom: 14px;
  }
  .card-title { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: #6ee7b7; margin-bottom: 12px; }

  /* LIST ROWS */
  .list-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .list-row:last-child { border-bottom: none; }

  /* BADGE */
  .badge { font-size: 10px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }

  /* BED GRID */
  .bed-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .bed-cell {
    border-radius: 10px; padding: 12px 10px; cursor: pointer;
    transition: all 0.2s; min-height: 80px;
    background: rgba(255,255,255,0.03);
    border: 1.5px solid rgba(255,255,255,0.08);
  }
  .bed-cell.occupied { background: rgba(52,211,153,0.07); border-color: rgba(52,211,153,0.25); }
  .bed-cell.selected { border-color: #34d399 !important; }
  .bed-label { font-size: 10px; color: #6b7280; letter-spacing: 0.12em; text-transform: uppercase; }
  .bed-emoji { float: right; font-size: 16px; }
  .bed-name { font-size: 13px; color: #d1fae5; margin-top: 8px; }
  .bed-empty { font-size: 11px; color: #6b7280; margin-top: 10px; }
  .bed-detail {
    margin-top: 14px;
    background: rgba(52,211,153,0.08);
    border: 1px solid rgba(52,211,153,0.25);
    border-radius: 12px; padding: 16px;
  }

  /* end removed */
  .crop-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .crop-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .crop-info { display: flex; gap: 10px; align-items: center; }
  .crop-name { font-size: 15px; color: #d1fae5; }
  .crop-family { font-size: 11px; color: #6b7280; }
  .crop-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 11px; color: #6b7280; margin-bottom: 10px; }
  .crop-meta span { color: #d1fae5; }
  .crop-notes { font-size: 11px; color: #9ca3af; font-style: italic; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 8px; margin-bottom: 10px; }
  .status-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .status-btn { flex: 1; min-width: 60px; padding: 5px 2px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.08); background: transparent; color: #4b5563; cursor: pointer; font-size: 10px; font-family: inherit; transition: all 0.15s; }
  .status-btn.active { border-color: var(--c); background: rgba(255,255,255,0.06); color: var(--c); }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; margin-bottom: 14px; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #6b7280; cursor: pointer; font-size: 11px; font-family: inherit; transition: all 0.15s; }
  .filter-btn.active { border-color: #34d399; background: rgba(52,211,153,0.12); color: #6ee7b7; }

  /* TASKS */
  .task-section { margin-bottom: 20px; }
  .task-priority-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; margin-bottom: 7px; transition: opacity 0.2s; }
  .task-row.done { opacity: 0.45; }
  .check-btn { width: 22px; height: 22px; border-radius: 6px; border: 1.5px solid rgba(255,255,255,0.2); background: transparent; cursor: pointer; flex-shrink: 0; font-size: 13px; display: flex; align-items: center; justify-content: center; color: #0d1a0e; transition: all 0.15s; }
  .check-btn.checked { background: #34d399; border-color: #34d399; }
  .task-text { flex: 1; font-size: 13px; color: #d1fae5; }
  .task-row.done .task-text { text-decoration: line-through; }
  .task-date { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .delete-btn { background: none; border: none; color: #374151; cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; }

  /* BUTTONS */
  .add-btn {
    width: 100%; padding: 13px; border-radius: 12px;
    border: 1px solid #34d399; background: rgba(52,211,153,0.12);
    color: #6ee7b7; cursor: pointer; font-size: 14px; font-family: inherit;
    margin-bottom: 16px; transition: background 0.15s;
  }
  .add-btn:active { background: rgba(52,211,153,0.22); }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #1a2e1b; border: 1px solid rgba(52,211,153,0.3); border-radius: 20px 20px 0 0; padding: 24px 20px 36px; width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 400; color: #6ee7b7; margin-bottom: 18px; }
  .field-label { font-size: 10px; color: #6b7280; display: block; margin-bottom: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
  .field-input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 12px; color: #d1fae5; font-size: 15px; font-family: inherit; }
  .field-input:focus { outline: none; border-color: rgba(52,211,153,0.4); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-full { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid #34d399; background: rgba(52,211,153,0.2); color: #6ee7b7; cursor: pointer; font-size: 14px; font-family: inherit; }
  .btn-secondary { flex: 1; padding: 13px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #6b7280; cursor: pointer; font-size: 14px; font-family: inherit; }
  .priority-row { display: flex; gap: 8px; }
  .priority-btn { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; cursor: pointer; font-size: 12px; font-family: inherit; color: #6b7280; transition: all 0.15s; }

  /* DATE PICKER */
  .date-input-wrap { position: relative; }
  .date-display {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 10px 12px; color: #d1fae5; font-size: 15px;
    font-family: inherit; cursor: pointer; text-align: left; display: flex;
    justify-content: space-between; align-items: center;
  }
  .date-display:focus { outline: none; border-color: rgba(52,211,153,0.4); }
  .date-display.empty { color: #6b7280; }
  .cal-popup {
    position: fixed; z-index: 1000; background: #1a2e1b;
    border: 1px solid rgba(52,211,153,0.35); border-radius: 16px;
    padding: 16px; width: 300px; box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cal-nav { background: none; border: none; color: #6ee7b7; font-size: 18px; cursor: pointer; padding: 4px 8px; }
  .cal-month-label { font-size: 14px; color: #d1fae5; font-family: inherit; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
  .cal-dow { font-size: 10px; color: #6b7280; text-align: center; padding: 4px 0; letter-spacing: 0.05em; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 8px; cursor: pointer; color: #d1fae5;
    background: transparent; border: none; font-family: inherit; transition: background 0.1s;
  }
  .cal-day:hover { background: rgba(52,211,153,0.15); }
  .cal-day.today { color: #6ee7b7; font-weight: bold; }
  .cal-day.selected { background: #34d399 !important; color: #0d1a0e; }
  .cal-day.other-month { color: #374151; }
  .cal-day.empty { cursor: default; }
  .cal-clear { margin-top: 10px; width: 100%; padding: 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #6b7280; font-family: inherit; font-size: 12px; cursor: pointer; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<header>
  <div class="header-top">
    <div style="display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:10px">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="width:42px;height:42px;border-radius:10px;flex-shrink:0">
          <rect width="512" height="512" rx="110" fill="#1a1005"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(45 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#d4954a" opacity="0.85" transform="rotate(90 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(135 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#d4954a" opacity="0.85" transform="rotate(180 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(225 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#d4954a" opacity="0.85" transform="rotate(270 256 256)"/>
          <ellipse cx="256" cy="148" rx="28" ry="58" fill="#c9a84c" opacity="0.9" transform="rotate(315 256 256)"/>
          <circle cx="256" cy="256" r="72" fill="#6b3d11"/>
          <circle cx="256" cy="256" r="55" fill="#4a2a08"/>
          <circle cx="256" cy="225" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="276" cy="238" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="276" cy="262" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="256" cy="275" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="236" cy="262" r="6" fill="#c9a84c" opacity="0.5"/>
          <circle cx="236" cy="238" r="6" fill="#c9a84c" opacity="0.5"/>
        </svg>
        <div>
          <div class="header-eyebrow" style="font-size:9px;color:#c9a84c">Markedshage</div>
          <h1 style="font-size:16px;font-weight:600;color:#e8f5e9;letter-spacing:0.02em;margin:0">Assistenten</h1>
        </div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;position:relative">
        <button id="undo-btn" onclick="undo()" title="Angre (Ctrl+Z)" disabled style="padding:7px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6b7280;cursor:pointer;font-size:15px;font-family:inherit;line-height:1">↩</button>
        <button id="redo-btn" onclick="redo()" title="Gjør om (Ctrl+Y)" disabled style="padding:7px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6b7280;cursor:pointer;font-size:15px;font-family:inherit;line-height:1">↪</button>
        <button onclick="gistConnected ? gistShowMenu() : gistSetup()" id="gist-btn" title="JSONBin synkronisering" style="padding:7px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6b7280;cursor:pointer;font-size:15px;font-family:inherit;line-height:1">☁</button>
        <button onclick="toggleGearMenu()" id="gear-btn" title="Innstillinger" style="padding:7px 11px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:#6b7280;cursor:pointer;font-size:15px;font-family:inherit;line-height:1">⚙</button>
        <div id="gear-menu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#1a2e1a;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:6px;min-width:190px;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,0.4)">
          <label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:#60a5fa;font-family:inherit" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">⬆ Importer fra Excel<input type="file" accept=".xlsx" onchange="importFromExcel(event);closeGearMenu()" style="display:none"></label>
          <button onclick="exportToExcel();closeGearMenu()" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#6ee7b7;font-family:inherit;text-align:left" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">⬇ Eksporter til Excel</button>
          <div style="height:1px;background:rgba(255,255,255,0.08);margin:4px 0"></div>
          <button onclick="nullstill();closeGearMenu()" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-size:13px;color:#f87171;font-family:inherit;text-align:left" onmouseover="this.style.background='rgba(255,255,255,0.06)'" onmouseout="this.style.background='transparent'">🗑 Nullstill</button>
        </div>
      </div>
    </div>
  </div>
</header>

<main>
  <div id="tab-oversikt"></div>
  <div id="tab-senger" style="display:none"></div>
  <div id="tab-vekster" style="display:none"></div>
  <div id="tab-oppgaver" style="display:none"></div>
  <div id="tab-kalender" style="display:none"></div>
</main>

<nav id="bottom-nav">
  <button class="tab-btn active" onclick="showTab('oversikt')">Oversikt</button>
  <button class="tab-btn" onclick="showTab('senger')">Senger</button>
  <button class="tab-btn" onclick="showTab('vekster')">Vekster</button>
  <button class="tab-btn" onclick="showTab('oppgaver')">Todo</button>
  <button class="tab-btn" onclick="showTab('kalender')">Kalender</button>
</nav>

<!-- Modals -->
<div id="modal-crop" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="modal-crop-title">Ny vekst</div>
    <div class="form-grid">
      <div><label class="field-label">Navn</label><input class="field-input" id="c-name" placeholder="f.eks. Tomater"></div>
      <div><label class="field-label">Emoji</label><input class="field-input" id="c-emoji" value="🌱" maxlength="4"></div>
      <div><label class="field-label">Sort</label><input class="field-input" id="c-family" placeholder="f.eks. Nattskygge"></div>
      <div><label class="field-label">Senger (komma-separert, f.eks. A1, A1-1:5, B2-3)</label><input class="field-input" id="c-beds" placeholder="A1, A1-1:5, B2-3"><div id="c-beds-error" style="display:none;color:#f87171;font-size:11px;margin-top:4px"></div></div>
      <div><label class="field-label">Radavstand (cm)</label><input class="field-input" id="c-rowspacing" type="number" value="30"></div>
      <div><label class="field-label">Planteavstand (cm)</label><input class="field-input" id="c-plantspacing" type="number" value="20"></div>
      <div><label class="field-label">Rader (per bed)</label><input class="field-input" id="c-rows" type="number" value="2"></div>
      <div><label class="field-label">Frø per klynge</label><input class="field-input" id="c-seedspercluster" type="number" value="1" min="1"></div>
      <div><label class="field-label">Pris pr/kg (kr)</label><input class="field-input" id="c-pricepkg" type="number" step="0.5" value="0" min="0"></div>
      <div><label class="field-label">Vekt per enhet (g)</label><input class="field-input" id="c-weightg" type="number" step="1" value="0" min="0"></div>
    </div>
    <div class="form-grid">
      <div><label class="field-label">Sådato</label><button type="button" class="date-display empty" id="c-sown-btn" onclick="openCal('c-sown-btn','c-sown-val')">Velg dato 📅</button><input type="hidden" id="c-sown-val"></div>
      <div><label class="field-label">Sålogg (dato)</label><button type="button" class="date-display empty" id="c-sowlog-btn" onclick="openCal('c-sowlog-btn','c-sowlog-val')">Velg dato 📅</button><input type="hidden" id="c-sowlog-val"></div>
      <div><label class="field-label">Plantedato</label><button type="button" class="date-display empty" id="c-planted-btn" onclick="openCal('c-planted-btn','c-planted-val')">Velg dato 📅</button><input type="hidden" id="c-planted-val"></div>
      <div><label class="field-label">Plantelogg (dato)</label><button type="button" class="date-display empty" id="c-plantlog-btn" onclick="openCal('c-plantlog-btn','c-plantlog-val')">Velg dato 📅</button><input type="hidden" id="c-plantlog-val"></div>
    </div>
    <div class="form-full"><label class="field-label">Status</label>
      <select class="field-input" id="c-status">
        <option value="planlagt">Planlagt</option>
        <option value="sådd">Sådd</option>
        <option value="plantet">Plantet</option>
        <option value="i_produksjon">I produksjon</option>
        <option value="høstet">Høstet</option>
      </select>
    </div>
    <div class="form-full"><label class="field-label">Notater</label><textarea class="field-input" id="c-notes" rows="2"></textarea></div>
    <div class="modal-actions">
      <button class="btn-primary" id="modal-crop-save-btn" onclick="saveCrop()">Legg til</button>
      <button class="btn-secondary" onclick="closeModal('modal-crop')">Avbryt</button>
    </div>
    <div id="modal-crop-delete-wrap" style="display:none;margin-top:10px">
      <button onclick="deleteCrop()" style="width:100%;padding:11px;border-radius:12px;border:1px solid rgba(248,113,113,0.4);background:rgba(248,113,113,0.08);color:#f87171;cursor:pointer;font-size:14px;font-family:inherit">🗑 Fjern denne veksten</button>
    </div>
  </div>
</div>

<div id="modal-bedsize" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-title" id="bs-bed-label">Størrelse på seng</div>
    <input type="hidden" id="bs-bed-id">
    <div class="form-grid">

let BED_IDS = ["A1","A2","A3","B1","B2","B3","C1","C2","C3","D1","D2","D3","E1","E2","E3","F1","F2","F3"];
let bedSizes = {};

let crops = [

  { id:2, name:"Gulrøtter", emoji:"🥕", family:"Skjermplanter", rowSpacing:20, plantSpacing:5,  rows:4, beds:["B2"], sownDate:"01-04-2026", sowLog:"", plantedDate:"",  plantLog:"", status:"planlagt",     pricePerKg:0, weightG:0, notes:"" },
  { id:3, name:"Salat",     emoji:"🥬", family:"Kurvplanter",   rowSpacing:30, plantSpacing:25, rows:3, beds:["C1","C2"], sownDate:"20-03-2026", sowLog:"", plantedDate:"", plantLog:"", status:"i_produksjon", pricePerKg:0, weightG:0, notes:"Successjonssåing hver 2. uke" },
  { id:4, name:"Erter",     emoji:"🫛", family:"Belgvekster",   rowSpacing:20, plantSpacing:10, rows:2, beds:["D1"], sownDate:"10-04-2026", sowLog:"", plantedDate:"",  plantLog:"", status:"planlagt",     pricePerKg:0, weightG:0, notes:"Nitrogenfixer" },

let tasks = [

  { id:2, text:"Gjødsle bed A1 og B2",       done:false, date:"01-04-2026", priority:"middels" },
  { id:3, text:"Sette opp staker til ertene",done:true,  date:"28-03-2026", priority:"lav" },
  { id:4, text:"Vanne drivhuset",             done:false, date:"05-04-2026", priority:"høy" },
];

let currentTab = (() => { try { return localStorage.getItem('mh_tab') || 'oversikt'; } catch(e) { return 'oversikt'; } })();

let cropSearch = "";

// ── Undo/Redo history ──
const MAX_HISTORY = 50;
let history = [];   // array of snapshots {crops, tasks, bedSizes, BED_IDS}
let historyIndex = -1;

function snapshot(skipGistSave = false) {
  history = history.slice(0, historyIndex + 1);
  history.push({
    crops:    JSON.parse(JSON.stringify(crops)),
    tasks:    JSON.parse(JSON.stringify(tasks)),
    bedSizes: JSON.parse(JSON.stringify(bedSizes)),
    bedIDs:   [...BED_IDS],
  });
  if (history.length > MAX_HISTORY) history.shift();
  historyIndex = history.length - 1;
  updateUndoRedoBtns();
  if (!skipGistSave) scheduleGistSave();
}

function undo() {
  if (historyIndex <= 0) return;
  historyIndex--;
  restoreSnapshot(history[historyIndex]);
}

function redo() {
  if (historyIndex >= history.length - 1) return;
  historyIndex++;
  restoreSnapshot(history[historyIndex]);
}

function restoreSnapshot(s) {
  crops    = JSON.parse(JSON.stringify(s.crops));
  tasks    = JSON.parse(JSON.stringify(s.tasks));
  bedSizes = JSON.parse(JSON.stringify(s.bedSizes));
  BED_IDS  = [...s.bedIDs];
  updateUndoRedoBtns();
  render();
}

function updateUndoRedoBtns() {
  const ub = document.getElementById('undo-btn');
  const rb = document.getElementById('redo-btn');
  if (!ub || !rb) return;
  const canUndo = historyIndex > 0;
  const canRedo = historyIndex < history.length - 1;
  ub.disabled = !canUndo;
  rb.disabled = !canRedo;
  ub.style.color    = canUndo ? '#d1fae5' : '#6b7280';
  ub.style.borderColor = canUndo ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.1)';
  rb.style.color    = canRedo ? '#d1fae5' : '#6b7280';
  rb.style.borderColor = canRedo ? 'rgba(255,255,255,0.25)' : 'rgba(255,255,255,0.1)';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y')                { e.preventDefault(); redo(); return; }
  const tag = document.activeElement && document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
  if (currentTab === 'kalender') {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); kalenderMoveDay(-1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); kalenderMoveDay(1);  }
    if (e.key === 'ArrowUp')    { e.preventDefault(); kalenderMoveDay(-7); }
    if (e.key === 'ArrowDown')  { e.preventDefault(); kalenderMoveDay(7);  }
  }
});

function syncCropTasks() {
  const today = new Date(); today.setHours(0,0,0,0);

  crops.forEach(crop => {
    [
      { type: 'saa',   dateField: crop.sownDate,    logField: crop.sowLog,   label: `Så ${crop.emoji} ${crop.name}` },
      { type: 'plant', dateField: crop.plantedDate, logField: crop.plantLog, label: `Plant ${crop.emoji} ${crop.name}` },
    ].forEach(({ type, dateField, logField, label }) => {
      const taskId = `crop-${crop.id}-${type}`; // stable string id for auto-tasks
      const existing = tasks.find(t => t.id === taskId);

      // If logged → mark done (if exists and not already done)
      if (logField) {
        if (existing && !existing.done) {
          tasks = tasks.map(t => t.id === taskId ? { ...t, done: true } : t);
        }
        return; // no further action needed
      }

      // No date set → remove any existing auto-task
      if (!dateField) {
        if (existing) tasks = tasks.filter(t => t.id !== taskId);
        return;
      }

      const d = parseToDate(dateField);
      if (!d) { if (existing) tasks = tasks.filter(t => t.id !== taskId); return; }
      d.setHours(0,0,0,0);

      const daysDiff = Math.floor((today - d) / 86400000); // negative = future
      if (daysDiff < 0) {
        // Date is in future — remove task if it exists
        if (existing) tasks = tasks.filter(t => t.id !== taskId);
        return;
      }

      // Date has arrived — determine priority
      const priority = daysDiff > 7 ? 'høy' : 'middels';

      if (!existing) {
        // Create new auto-task
        tasks = [...tasks, { id: taskId, text: label, done: false, date: dateField, priority }];
      } else {
        // Update priority if needed (escalate only, don't downgrade)
        if (priority === 'høy' && existing.priority !== 'høy') {
          tasks = tasks.map(t => t.id === taskId ? { ...t, priority: 'høy' } : t);
        }
      }
    });
  });
}

function render() {

// ── Segment helpers ──────────────────────────────────────────────────────────
// bedSpec formats: "A1", "A1-3", "A1-1:5"
// Returns { bedId, start, end } where start/end are meters (1-based), null=whole bed
function parseBedSpec(spec) {
  spec = spec.trim();
  const segMatch = spec.match(/^([A-Za-z]+\d+)-(\d+)(?::(\d+))?$/);
  if (segMatch) {
    const bedId = segMatch[1].toUpperCase();
    const start = parseInt(segMatch[2]);
    const end   = segMatch[3] !== undefined ? parseInt(segMatch[3]) : start;
    return { bedId, start, end };
  }
  return { bedId: spec.toUpperCase(), start: null, end: null };
}

function segmentLength(spec) {
  const { bedId, start, end } = parseBedSpec(spec);
  if (start === null) return (bedSizes[bedId] || {length:11}).length;
  return end - start + 1;
}

// All crops occupying a given bedId (segment-aware)
function getCropsInBed(bedId) {
  bedId = bedId.toUpperCase();
  return crops.filter(c => c.beds.some(s => parseBedSpec(s).bedId === bedId));
}

// Get crops in bed for the bed grid (returns first crop for legacy single-crop display)
function getBedCrop(bed) {
  return crops.find(c => c.beds.some(s => parseBedSpec(s).bedId === bed.toUpperCase()));
}

// Check for overlapping segments when saving a crop (returns array of conflict descriptions)
function checkOverlap(bedSpecs, excludeCropId) {
  const warnings = [];
  bedSpecs.forEach(spec => {
    const { bedId, start, end } = parseBedSpec(spec);
    if (start === null) return; // whole-bed specs: skip overlap check
    crops.forEach(other => {
      if (other.id === excludeCropId) return;
      other.beds.forEach(oSpec => {
        const o = parseBedSpec(oSpec);
        if (o.bedId !== bedId) return;
        if (o.start === null) {
          warnings.push(`${other.emoji} ${other.name} bruker hele seng ${bedId}`);
          return;
        }
        // Check numeric overlap
        if (start <= o.end && end >= o.start) {
          warnings.push(`${other.emoji} ${other.name} bruker ${oSpec} i seng ${bedId}`);
        }
      });
    });
  });
  return [...new Set(warnings)];
}

function badge(status) {
  const s = STATUS[status];
  return `<span class="badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;
}

/* ---- OVERSIKT ---- */
function renderOversikt() {

  const filledBeds = new Set(

      .filter(c => c.sowLog || c.plantLog)

  const stats = [

/* ---- PLANT COUNT CALCULATOR ---- */
function calcPlants(crop) {
  let total = 0;
  crop.beds.forEach(spec => {
    const { bedId } = parseBedSpec(spec);
    const bs = bedSizes[bedId];
    if (!bs) return;
    const lenM = segmentLength(spec);
    const lenCm = lenM * 100;
    const rows = crop.rows || 1;
    const plantSpacing = crop.plantSpacing || 1;
    const plantsPerRow = Math.floor(lenCm / plantSpacing) + 1;
    total += rows * plantsPerRow;
  });
  return total;
}

function calcValue(crop) {
  // value (kr) = plants × weightG/1000 × pricePerKg
  if (!crop.pricePerKg || !crop.weightG) return null;
  return Math.round(calcPlants(crop) * (crop.weightG / 1000) * crop.pricePerKg);
}

function renderSenger() {
  const fields = ['alle', ...new Set(BED_IDS.map(id => id.match(/^([A-Za-z]+)/)?.[1] || id))].sort((a,b) => a==='alle'?-1:b==='alle'?1:a.localeCompare(b));
  const visibleBeds = bedFieldFilter === 'alle' ? BED_IDS : BED_IDS.filter(id => (id.match(/^([A-Za-z]+)/)?.[1] || '') === bedFieldFilter);

  document.getElementById('tab-senger').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px">
      <h2 style="font-size:16px;font-weight:400;color:#d1fae5;margin:0">Sengekart (${BED_IDS.length} senger)</h2>
      <div style="display:flex;gap:8px">
        <button onclick="openAddBed()" style="padding:7px 14px;border-radius:20px;border:1px solid rgba(52,211,153,0.4);background:rgba(52,211,153,0.1);color:#6ee7b7;cursor:pointer;font-size:12px;font-family:inherit">+ Legg til seng</button>
      </div>
    </div>
    <div class="filter-bar" style="margin-bottom:12px">
      ${fields.map(f => `<button class="filter-btn ${bedFieldFilter===f?'active':''}" onclick="setBedField('${f}')">${f==='alle'?'Alle':f}</button>`).join('')}
    </div>
    <div class="bed-grid">
      ${(() => {
        const COLS = 3;
        const rows = [];
        for (let i = 0; i < visibleBeds.length; i += COLS) {
          rows.push(visibleBeds.slice(i, i + COLS));
        }
        return rows.map(row => {
          const selectedInRow = row.find(bed => bed === selectedBed);

          const cells = row.map(bed => {
            const bedCropList = getCropsInBed(bed);
            const sz = bedSizes[bed];
            const occupied = bedCropList.length > 0;
            const isSelected = bed === selectedBed;
            const cls = ['bed-cell', occupied?'occupied':'', isSelected?'selected':''].join(' ');

            if (bedCropList.length === 1) {
              const c = bedCropList[0];
              return `<div class="${cls}" onclick="selectBed('${bed}')">
                <div><span class="bed-label">Seng ${bed}</span></div>
                <div class="bed-name">${c.name}</div>
                <div style="font-size:9px;color:#6b7280;margin-top:6px">${sz.length}m × ${sz.width}m</div>
              </div>`;
            } else if (bedCropList.length > 1) {
              const nameMap = {};
              bedCropList.forEach(c => { nameMap[c.name] = (nameMap[c.name] || 0) + 1; });
              const uniqueNames = Object.keys(nameMap);
              const namesHtml = uniqueNames.map((n, i) =>
                `<span style="font-size:13px;color:#d1fae5;white-space:nowrap">${n}</span>${i < uniqueNames.length-1 ? '<span style="color:#6b7280;font-size:12px;margin:0 3px">·</span>' : ''}`
              ).join('');
              return `<div class="${cls}" onclick="selectBed('${bed}')">
                <div><span class="bed-label">Seng ${bed}</span></div>
                <div style="display:flex;flex-wrap:wrap;align-items:center;gap:1px;margin-top:4px;max-width:100%">${
                  uniqueNames.map((n, i) => {
                    const isLast = i === uniqueNames.length - 1;
                    const lineBreak = (i % 2 === 1 && !isLast) ? '<div style="width:100%;height:0"></div>' : '';
                    return `<span style="font-size:13px;color:#d1fae5;white-space:nowrap">${n}</span>${!isLast ? '<span style="color:#6b7280;font-size:12px;margin:0 3px">·</span>' : ''}${lineBreak}`;
                  }).join('')
                }</div>
                <div style="font-size:9px;color:#6b7280;margin-top:4px">${sz.length}m × ${sz.width}m</div>
              </div>`;
            } else {
              return `<div class="${cls}" onclick="selectBed('${bed}')">
                <div><span class="bed-label">Seng ${bed}</span></div>
                <div class="bed-empty">Ledig</div>
                <div style="font-size:9px;color:#6b7280;margin-top:6px">${sz.length}m × ${sz.width}m</div>
              </div>`;
            }
          }).join('');

          // Build detail panel if a bed in this row is selected
          let detailHtml = '';
          if (selectedInRow) {
            const bed = selectedInRow;
            const bs = bedSizes[bed];
            const bedLen = bs.length;
            const bedCropList = getCropsInBed(bed);
            const occ = [];
            bedCropList.forEach(crop => {
              crop.beds.forEach(spec => {
                const { bedId, start, end } = parseBedSpec(spec);
                if (bedId !== bed) return;
                occ.push({ start: start || 1, end: end || bedLen, crop, spec });
              });
            });
            occ.sort((a,b) => a.start - b.start);
            const free = [];
            let pos = 1;
            occ.forEach(o => {
              if (o.start > pos) free.push({ start: pos, end: o.start - 1 });
              pos = Math.max(pos, o.end + 1);
            });
            if (pos <= bedLen) free.push({ start: pos, end: bedLen });

            const cropRows = occ.map(o => {
              const g = calcGang(o.crop, o.spec);
              const segLen = o.end - o.start + 1;
              const hasSegment = parseBedSpec(o.spec).start !== null;
              return `<div style="padding:12px;border-radius:10px;background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.15);margin-bottom:8px">
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
                  <span style="font-size:24px">${o.crop.emoji}</span>
                  <div style="flex:1">
                    <div style="font-size:15px;color:#d1fae5">${o.crop.family || o.crop.name}</div>
                    ${o.crop.family ? `<div style="font-size:11px;color:#6b7280">${o.crop.name}</div>` : ''}
                    ${hasSegment ? `<div style="font-size:11px;color:#60a5fa">Meter ${o.start}–${o.end} (${segLen}m)</div>` : `<div style="font-size:11px;color:#6b7280">Hele sengen (${bedLen}m)</div>`}
                  </div>
                  ${badge(o.crop.status)}
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:#6b7280">
                  <div>Sådato: <span style="color:#d1fae5">${o.crop.sownDate||'–'}</span></div>
                  <div>Plantedato: <span style="color:#d1fae5">${o.crop.plantedDate||'–'}</span></div>
                  <div>Radavstand: <span style="color:#d1fae5">${o.crop.rowSpacing} cm</span></div>
                  <div>Planteavstand: <span style="color:#d1fae5">${o.crop.plantSpacing} cm</span></div>
                  <div>Rader: <span style="color:#d1fae5">${o.crop.rows}</span></div>
                  <div>Antall planter: <span style="color:#34d399;font-weight:bold">${calcPlants({...o.crop, beds:[o.spec]})}</span></div>
                  ${g !== null ? `<div>Gangavstand: <span style="color:#d1fae5">${g} cm</span></div>` : ''}
                </div>
                ${o.crop.notes ? `<div style="margin-top:8px;font-size:12px;color:#9ca3af;font-style:italic">📝 ${o.crop.notes}</div>` : ''}
              </div>`;
            }).join('');

            const freeRows = free.map(f =>
              `<div style="padding:10px 12px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);margin-bottom:8px;font-size:12px;color:#6b7280">
                Ledig: meter ${f.start}–${f.end} (${f.end - f.start + 1}m)
              </div>`
            ).join('');

            detailHtml = `<div style="grid-column:1/-1;padding:14px;border-radius:12px;background:rgba(0,0,0,0.2);border:1px solid rgba(52,211,153,0.2);margin-bottom:4px">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                <div style="font-size:13px;color:#6ee7b7">Seng ${bed} — ${bs.length}m × ${bs.width}m</div>
                <div style="display:flex;gap:8px;align-items:center">
                  <button onclick="openBedSizeEdit('${bed}')" style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.25);border-radius:8px;color:#6ee7b7;cursor:pointer;padding:4px 10px;font-size:11px;font-family:inherit">Endre størrelse</button>
                  ${getCropsInBed(bed).length === 0 ? `<button onclick="deleteBed('${bed}')" style="padding:4px 10px;border-radius:8px;border:1px solid rgba(248,113,113,0.4);background:rgba(248,113,113,0.08);color:#f87171;cursor:pointer;font-size:11px;font-family:inherit">🗑 Slett</button>` : ''}
                </div>
              </div>
              ${cropRows}${freeRows}
            </div>`;
          }

          return `${cells}${detailHtml ? `<div style="grid-column:1/-1">${detailHtml}</div>` : ''}`;
        }).join('');
      })()}
    </div>`;
}

function selectBed(bed) {
  selectedBed = selectedBed === bed ? null : bed;
  renderSenger();
}

function setBedField(f) {
  bedFieldFilter = f;
  selectedBed = null;
  renderSenger();
}

function openAddBed() {
  document.getElementById('ab-name').value = '';
  document.getElementById('ab-length').value = 11;
  document.getElementById('ab-width').value = 1.2;
  document.getElementById('ab-error').style.display = 'none';
  document.getElementById('modal-addbed').style.display = 'flex';
}

function addBed() {
  const name = document.getElementById('ab-name').value.trim().toUpperCase();
  const errEl = document.getElementById('ab-error');
  if (!name) { errEl.textContent = 'Skriv inn et sengnavn.'; errEl.style.display='block'; return; }
  if (BED_IDS.includes(name)) { errEl.textContent = `Seng ${name} finnes allerede.`; errEl.style.display='block'; return; }
  BED_IDS.push(name);
  snapshot();
  bedSizes[name] = {
    length: parseFloat(document.getElementById('ab-length').value) || 11,
    width:  parseFloat(document.getElementById('ab-width').value)  || 1.2,
  };
  closeModal('modal-addbed');
  selectedBed = name;
  renderSenger();
}

function deleteBed(bedId) {
  if (getCropsInBed(bedId).length > 0) return;
  snapshot();
  BED_IDS = BED_IDS.filter(id => id !== bedId);
  delete bedSizes[bedId];
  selectedBed = null;
  renderSenger();
}

function renderVekster() {
  let filtered = cropFilter === 'alle' ? crops : crops.filter(c => c.status === cropFilter);
  if (cropSearch) {
    const q = cropSearch.toLowerCase();
    filtered = filtered.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.family || '').toLowerCase().includes(q) ||
      (c.notes || '').toLowerCase().includes(q)
    );
  }
  const filters = ['alle', ...Object.keys(STATUS)];

  // Sort fields definition
  const SORT_FIELDS = [
    { key:'name',         label:'Navn' },
    { key:'family',       label:'Sort' },
    { key:'status',       label:'Status' },
    { key:'sownDate',     label:'Sådato' },
    { key:'sowLog',       label:'Sålogg' },
    { key:'plantedDate',  label:'Plantedato' },
    { key:'plantLog',     label:'Plantelogg' },
    { key:'rowSpacing',   label:'Radavstand' },
    { key:'plantSpacing', label:'Planteavstand' },
    { key:'rows',         label:'Rader' },
    { key:'seedsPerCluster', label:'Frø per klynge' },
    { key:'pricePerKg',   label:'Pris pr/kg' },
    { key:'weightG',      label:'Vekt per enhet' },
    { key:'calcPlants',   label:'Antall planter' },
    { key:'calcValue',    label:'Estimert verdi' },
  ];

  // Apply sort
  const sortedFiltered = [...filtered].sort((a, b) => {
    let va, vb;
    if (cropSortField === 'calcPlants') { va = calcPlants(a); vb = calcPlants(b); }
    else if (cropSortField === 'calcValue') { va = calcValue(a); vb = calcValue(b); }
    else if (['sownDate','sowLog','plantedDate','plantLog'].includes(cropSortField)) {
      va = parseToDate(a[cropSortField])?.getTime() ?? null;
      vb = parseToDate(b[cropSortField])?.getTime() ?? null;
    } else {
      va = a[cropSortField] ?? null;
      vb = b[cropSortField] ?? null;
    }
    const emptyA = va === null || va === '' || va === 0;
    const emptyB = vb === null || vb === '' || vb === 0;
    if (emptyA && emptyB) return 0;
    if (emptyA) return 1;   // always last
    if (emptyB) return -1;  // always last
    if (va < vb) return cropSortDir === 'asc' ? -1 : 1;
    if (va > vb) return cropSortDir === 'asc' ? 1 : -1;
    return 0;
  });

  const currentSortLabel = SORT_FIELDS.find(f => f.key === cropSortField)?.label || 'Navn';

      </div>
      <div style="flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:4px 10px;gap:6px">
        <span style="color:#4b5563;font-size:12px">⌕</span>
        <input id="search-input" type="text" placeholder="Søk…" value="${cropSearch}" oninput="onSearchInput()" onkeydown="onSearchKey(event)" style="background:transparent;border:none;outline:none;color:#d1fae5;font-size:11px;font-family:inherit;width:100%;caret-color:#34d399" autocomplete="off">
        ${cropSearch ? `<button onclick="clearSearch()" style="background:transparent;border:none;color:#6b7280;cursor:pointer;font-size:12px;padding:0;line-height:1">✕</button>` : ''}
      </div>
      <div style="display:flex;flex-shrink:0;border-radius:20px;border:1px solid rgba(255,255,255,0.15);overflow:hidden">
        <button onclick="toggleSortDir()" style="padding:0 7px;background:rgba(255,255,255,0.04);color:#9ca3af;cursor:pointer;font-size:11px;font-family:inherit;border:none;border-right:1px solid rgba(255,255,255,0.15)">${dirSymbol}</button>
        <button onclick="toggleSortMenu(event)" id="sort-btn" style="padding:0 8px;background:rgba(255,255,255,0.04);color:#9ca3af;cursor:pointer;font-size:10px;font-family:inherit;border:none;white-space:nowrap">${currentSortLabel}</button>
      </div>
    </div>
    ${sortedFiltered.map(c => {

      return `<div class="crop-card">

          </div>

          <button onclick="toggleCropExpand(${c.id})" style="flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:20px;color:#9ca3af;cursor:pointer;padding:8px;font-size:13px;font-family:inherit">${isExpanded ? '▲ Vis mindre' : '▼ Vis mer'}</button>

/* ---- CALENDAR PICKER ---- */
let calState = { btnId: null, valId: null, year: 2026, month: 2 }; // month 0-indexed
const MONTHS_NO = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
const DAYS_NO = ['Ma','Ti','On','To','Fr','Lø','Sø'];

function openCal(btnId, valId) {
  const existing = document.getElementById('cal-popup');
  if (existing) existing.remove();
  const now = new Date();
  const hidden = document.getElementById(valId).value;
  let year = now.getFullYear(), month = now.getMonth();
  if (hidden) {
    const [d,m,y] = hidden.split('-');
    year = +y; month = +m - 1;
  }
  calState = { btnId, valId, year, month };
  renderCal();
}

function renderCal() {
  const existing = document.getElementById('cal-popup');
  if (existing) existing.remove();

  const { btnId, valId, year, month } = calState;
  const selectedVal = document.getElementById(valId).value;
  const btn = document.getElementById(btnId);
  if (!btn) return;

  const popup = document.createElement('div');
  popup.className = 'cal-popup';
  popup.id = 'cal-popup';

  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const startOffset = (firstDay === 0 ? 6 : firstDay - 1); // Mon-start
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();

  let days = '';
  DAYS_NO.forEach(d => { days += `<div class="cal-dow">${d}</div>`; });
  for (let i = 0; i < startOffset; i++) days += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dd = String(d).padStart(2,'0');
    const mm = String(month+1).padStart(2,'0');
    const val = `${dd}-${mm}-${year}`;
    const isToday = d===today.getDate() && month===today.getMonth() && year===today.getFullYear();
    const isSel = val === selectedVal;
    days += `<div class="cal-day${isToday?' today':''}${isSel?' selected':''}" onclick="selectDate('${val}','${btnId}','${valId}')">${d}</div>`;
  }

  popup.innerHTML = `
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1,event)">‹</button>
      <span class="cal-month-label">${MONTHS_NO[month]} ${year}</span>
      <button class="cal-nav" onclick="calNav(1,event)">›</button>
    </div>
    <div class="cal-grid">${days}</div>
    <div style="display:flex;gap:6px;padding:0 4px 4px">
      <button class="cal-clear" style="flex:1" onclick="selectTodayInCal('${btnId}','${valId}')">I dag</button>
      <button class="cal-clear" style="flex:1" onclick="clearDate('${btnId}','${valId}')">Fjern dato</button>
    </div>`;

  // Position near button
  document.body.appendChild(popup);
  const rect = btn.getBoundingClientRect();
  const popW = 300, popH = 280;
  let top = rect.bottom + 6, left = rect.left;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if (top + popH > window.innerHeight - 8) top = rect.top - popH - 6;
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';
}

function calNav(dir, event) {
  if (event) event.stopPropagation();
  calState.month += dir;
  if (calState.month < 0) { calState.month = 11; calState.year--; }
  if (calState.month > 11) { calState.month = 0; calState.year++; }
  renderCal();
}

function selectDate(val, btnId, valId) {
  const popup = document.getElementById('cal-popup');
  if (popup) popup.remove();
  // If this is a modus date picker, store and re-render
  if (valId === 'modus-date-val') {
    const crop = crops.find(c => c.id === modusCrops[modusIndex]);
    if (crop) modusLogDate[crop.id] = val;
    renderModus();
    return;
  }
  if (valId === 'modus-main-val') {
    const crop = crops.find(c => c.id === modusCrops[modusIndex]);
    if (crop) modusMainDate[crop.id] = val;
    renderModus();
    return;
  }
  setDateField(btnId, valId, val);
}

function clearDate(btnId, valId) {
  const popup = document.getElementById('cal-popup');
  if (popup) popup.remove();
  if (valId === 'modus-date-val') {
    document.getElementById(valId).value = '';
    const crop = crops.find(c => c.id === modusCrops[modusIndex]);
    if (crop) modusLogDate[crop.id] = '';
    renderModus();
    return;
  }
  setDateField(btnId, valId, '');
}

function selectTodayInCal(btnId, valId) {
  const today = new Date();
  const val = String(today.getDate()).padStart(2,'0')+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+today.getFullYear();
  selectDate(val, btnId, valId);
}

let _onDatePicked = null; // optional callback(val) after date is picked

function setDateField(btnId, valId, val) {
  const hiddenEl = document.getElementById(valId);
  if (hiddenEl) { hiddenEl.value = val || ''; }
  const btn = document.getElementById(btnId);
  if (btn) {
    if (val) { btn.textContent = val + ' 📅'; btn.classList.remove('empty'); }
    else { btn.textContent = 'Velg dato 📅'; btn.classList.add('empty'); }
  }
  if (_onDatePicked) { const cb = _onDatePicked; _onDatePicked = null; cb(val); }
}

// Close calendar on outside click
document.addEventListener('click', e => {
  const popup = document.getElementById('cal-popup');
  if (!popup) return;
  if (popup.contains(e.target)) return;
  // Don't close if clicking a button that opens the calendar
  if (e.target.closest && e.target.closest('[onclick*="openCal"], [onclick*="openModus"], [onclick*="startEditTaskDate"]')) return;
  popup.remove();
});
function setCropFilter(f) { cropFilter = f; renderVekster(); }

function calcGang(crop, bedSpec) {
  const spec = bedSpec || (crop.beds[0] || '');
  const { bedId } = parseBedSpec(spec);
  const bs = bedSizes[bedId];
  if (!bs) return null;
  const bedWidthCm = bs.width * 100;
  const rows = crop.rows || 1;
  const rowSpacing = crop.rowSpacing || 0;
  const gang = (bedWidthCm - (rows - 1) * rowSpacing) / 2;
  return Math.round(gang * 10) / 10;
}

function saveCrop() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) return;
  const rawBeds = document.getElementById('c-beds').value.split(',').map(s=>s.trim()).filter(Boolean);

  // Validate format and check for unknown beds
  const validFmt = /^[A-Za-z]+\d+(-\d+(?::\d+)?)?$/;
  for (const spec of rawBeds) {
    if (!validFmt.test(spec)) {
      document.getElementById('c-beds-error').textContent = `Ugyldig format: "${spec}". Bruk f.eks. A1, A1-3 eller A1-1:5`;
      document.getElementById('c-beds-error').style.display = 'block';
      return;
    }
    const { bedId, start, end } = parseBedSpec(spec);
    if (!BED_IDS.includes(bedId)) {
      // Prompt to create bed
      pendingNewBed = { bedId, continueWith: { name, rawBeds } };
      document.getElementById('new-bed-name').textContent = bedId;
      document.getElementById('modal-new-bed').style.display = 'flex';
      return;
    }
    if (start !== null && end !== null) {
      const bedLen = (bedSizes[bedId] || {length:11}).length;
      if (start < 1 || end > bedLen || start > end) {
        document.getElementById('c-beds-error').textContent = `${spec}: meter ${start}–${end} er utenfor seng ${bedId} (${bedLen}m)`;
        document.getElementById('c-beds-error').style.display = 'block';
        return;
      }
    }
  }
  document.getElementById('c-beds-error').style.display = 'none';

  // Check overlaps
  const overlaps = checkOverlap(rawBeds, editingCropId);
  if (overlaps.length && !pendingOverlapConfirmed) {
    pendingOverlapConfirmed = true;
    const msg = 'Advarsel: Overlapp med eksisterende vekster:\n• ' + overlaps.join('\n• ') + '\n\nVil du lagre likevel?';
    if (!confirm(msg)) { pendingOverlapConfirmed = false; return; }
  }
  pendingOverlapConfirmed = false;

  const data = {
    name,
    emoji: document.getElementById('c-emoji').value || '🌱',
    family: document.getElementById('c-family').value,
    rowSpacing: +document.getElementById('c-rowspacing').value || 30,
    plantSpacing: +document.getElementById('c-plantspacing').value || 20,
    rows: +document.getElementById('c-rows').value || 2,
    seedsPerCluster: +document.getElementById('c-seedspercluster').value || 1,
    beds: rawBeds,
    sownDate: document.getElementById('c-sown-val').value,
    sowLog: document.getElementById('c-sowlog-val').value,
    plantedDate: document.getElementById('c-planted-val').value,
    plantLog: document.getElementById('c-plantlog-val').value,
    status: document.getElementById('c-status').value,
    pricePerKg: parseFloat(document.getElementById('c-pricepkg').value) || 0,
    weightG: parseFloat(document.getElementById('c-weightg').value) || 0,
    notes: document.getElementById('c-notes').value,
  };
  const existingCrop = editingCropId !== null ? crops.find(c => c.id === editingCropId) : null;
  const prevStatus = existingCrop ? existingCrop.status : 'planlagt';
  const prevSowLog = existingCrop ? existingCrop.sowLog : '';
  const prevPlantLog = existingCrop ? existingCrop.plantLog : '';

  let autoStatus = data.status;
  if (data.sowLog && data.sowLog !== prevSowLog) {
    autoStatus = 'sådd';
  } else if (data.plantLog && data.plantLog !== prevPlantLog) {
    autoStatus = 'plantet';
  }
  data.status = autoStatus;

  if (editingCropId !== null) {
    snapshot();
    crops = crops.map(c => c.id === editingCropId ? { ...c, ...data } : c);
  } else {
    snapshot();
    crops.push({ id: Date.now(), ...data });
  }
  closeModal('modal-crop');
  render();
}

  document.getElementById('tab-oppgaver').innerHTML = `
    <button class="add-btn" onclick="document.getElementById('modal-task').style.display='flex'">+ Ny oppgave</button>
    ${priorities.map(p => {
      const pts = tasks.filter(t => t.priority === p);
      if (!pts.length) return '';
      return `<div class="task-section">
        <div class="task-priority-label" style="color:${pColors[p]}">● ${p.charAt(0).toUpperCase()+p.slice(1)} prioritet</div>
        ${pts.map(t => {
          const tid = typeof t.id === 'string' ? `'${t.id}'` : t.id;
          const isAuto = typeof t.id === 'string' && t.id.startsWith('crop-');
          const MONTHS_SHORT = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
          const dateDisplay = t.date ? (() => { const [d,m] = t.date.split('-'); return `${+d}. ${MONTHS_SHORT[+m-1]}`; })() : '+ dato';
          return `
          <div class="task-row ${t.done?'done':''}">
            ${isAuto
              ? `<div class="check-btn ${t.done?'checked':''}" title="Registrer så/plante-logg for å krysse av" style="cursor:default;opacity:0.5">${t.done?'✓':'🔒'}</div>`
              : `<button class="check-btn ${t.done?'checked':''}" onclick="toggleTask(${tid})">${t.done?'✓':''}</button>`
            }
            <div style="flex:1;min-width:0">
              ${isAuto
                ? `<div class="task-text">${t.text}</div>`
                : `<div class="task-text" onclick="startEditTaskText(${tid}, this)" style="cursor:text;min-height:20px" title="Trykk for å redigere">${t.text}</div>`
              }
              ${isAuto
                ? (t.date ? `<div class="task-date">📅 ${dateDisplay}</div>` : '')
                : `<div class="task-date" onclick="startEditTaskDate(${tid}, event)" style="cursor:pointer;color:${t.date?'#6b7280':'rgba(107,114,128,0.5)'}">📅 ${dateDisplay}</div>`
              }
            </div>
            ${isAuto ? '' : `
              <button onclick="cycleTaskPriority(${tid})" title="Endre prioritet" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;color:${pColors[t.priority]}">●</button>
              <button class="delete-btn" onclick="deleteTask(${tid})">×</button>
            `}
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
    ${tasks.length===0?'<p style="color:#6b7280;font-size:13px;text-align:center;padding:20px 0">Ingen oppgaver ennå</p>':''}`;
}

function toggleTask(id) {
  if (typeof id === 'string' && id.startsWith('crop-')) return;
  snapshot(); tasks = tasks.map(t => t.id===id ? {...t, done:!t.done} : t); render();
}
function deleteTask(id) { snapshot(); tasks = tasks.filter(t => t.id!==id); render(); }

function startEditTaskText(id, el) {
  if (el.querySelector('input')) return; // already editing
  const current = el.textContent;
  el.innerHTML = '';
  const input = document.createElement('input');
  input.value = current;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #34d399;outline:none;color:#d1fae5;font-size:14px;font-family:inherit;width:100%;caret-color:#34d399';
  el.appendChild(input);
  input.focus();
  input.select();

  function commit() {
    const val = input.value.trim();
    if (val && val !== current) {
      snapshot();
      tasks = tasks.map(t => t.id===id ? {...t, text:val} : t);
    }
    renderOppgaver();
  }
  input.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); commit(); } if (e.key==='Escape') renderOppgaver(); });

}

  if (event) event.stopPropagation();

  let btn = document.getElementById('_task-cal-btn');

    val.type = 'hidden';

    if (newDate !== (t.date || '')) {

function cycleTaskPriority(id) {
  const order = ['høy','middels','lav'];
  snapshot();
  tasks = tasks.map(t => {

    const next = order[(order.indexOf(t.priority)+1) % order.length];
    return {...t, priority:next};
  });
  renderOppgaver();
}

/* ---- KALENDER ---- */
let kalenderYear  = new Date().getFullYear();
let kalenderMonth = new Date().getMonth();
let kalenderSelectedDay = null;

function parseToDate(str) {
  if (!str) return null;
  const m = str.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (!m) return null;
  return new Date(+m[3], +m[2]-1, +m[1]);
}

function toDateKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function getISOWeek(d) {
  const tmp = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = tmp.getUTCDay() || 7;
  tmp.setUTCDate(tmp.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(tmp.getUTCFullYear(), 0, 1));
  return Math.ceil((((tmp - yearStart) / 86400000) + 1) / 7);
}

function getCalEvents() {
  const map = {};
  const add = (dateStr, label, emoji, color, extra) => {
    const d = parseToDate(dateStr);
    if (!d) return;
    const k = toDateKey(d);
    if (!map[k]) map[k] = [];
    map[k].push({ label, emoji, color, ...extra });
  };
  crops.forEach(c => {
    if (c.sownDate && !c.sowLog) add(c.sownDate, 'Sådato: '+c.name, c.emoji, '#60a5fa');
    if (c.plantedDate && !c.plantLog) {
      const segSpecs = c.beds.filter(s => parseBedSpec(s).start !== null);
      const segLabel = segSpecs.length > 0 ? ` (${segSpecs.join(', ')})` : '';
      add(c.plantedDate, 'Plantedato: '+c.name+segLabel, c.emoji, '#34d399');
    }
  });
  const pColors = {høy:'#f87171', middels:'#fbbf24', lav:'#6ee7b7'};
  tasks.filter(t => t.date && !t.done).forEach(t => {
    add(t.date, t.text, '📋', pColors[t.priority] || '#fbbf24', { taskId: t.id, priority: t.priority });
  });

  return map;
}

function renderKalender() {
  const MONTHS = ['Januar','Februar','Mars','April','Mai','Juni','Juli','August','September','Oktober','November','Desember'];
  const DAYS   = ['Ma','Ti','On','To','Fr','Lø','Sø'];
  const events = getCalEvents();
  const firstDay = new Date(kalenderYear, kalenderMonth, 1);
  const lastDay  = new Date(kalenderYear, kalenderMonth + 1, 0);
  let startDow = firstDay.getDay();
  startDow = startDow === 0 ? 6 : startDow - 1;
  const today = toDateKey(new Date());

  // Build cells array
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let d = 1; d <= lastDay.getDate(); d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  // Split into rows of 7
  const rows = [];
  for (let i = 0; i < cells.length; i += 7) rows.push(cells.slice(i, i+7));

  // Header row: week-number col + day labels
  const headerRow = '<div style="display:grid;grid-template-columns:28px repeat(7,1fr);gap:3px;margin-bottom:3px">'
    + '<div></div>'
    + DAYS.map(d => '<div style="text-align:center;font-size:10px;color:#6b7280;padding:3px 0;letter-spacing:0.05em">'+d+'</div>').join('')
    + '</div>';

  const gridRows = rows.map(row => {
    const firstD = row.find(d => d !== null);
    const wkNum = firstD ? getISOWeek(new Date(kalenderYear, kalenderMonth, firstD)) : '';
    const cols = row.map(d => {
      if (!d) return '<div style="min-height:52px"></div>';
      const key = kalenderYear+'-'+String(kalenderMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      const isToday = key === today, isSel = key === kalenderSelectedDay;
      const ev = events[key] || [];
      const dots = ev.slice(0,3).map(e => '<div style="width:5px;height:5px;border-radius:50%;background:'+e.color+'"></div>').join('');
      return '<div onclick="selectKalenderDay(\''+key+'\')" style="min-height:52px;padding:5px 4px;border-radius:8px;cursor:pointer;'

        +(ev.length ? '<div style="font-size:9px;color:#6b7280;margin-top:2px">'+ev.length+'</div>' : '')
        +'</div>';
    }).join('');
    return '<div style="display:grid;grid-template-columns:28px repeat(7,1fr);gap:3px;margin-bottom:3px">'
      +'<div style="display:flex;align-items:flex-start;justify-content:center;padding-top:6px;font-size:9px;color:#4b5563;font-weight:600">'+wkNum+'</div>'
      +cols+'</div>';
  }).join('');

  // Ukeliste: events from the week of the selected day (or current week if nothing selected)
  const refDate = kalenderSelectedDay ? (()=>{ const p=kalenderSelectedDay.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); })() : new Date();
  const refDay = refDate.getDay() || 7;
  const monday = new Date(refDate); monday.setDate(refDate.getDate() - refDay + 1); monday.setHours(0,0,0,0);
  const weekKeys = Array.from({length:7}, (_,i) => { const d = new Date(monday); d.setDate(monday.getDate()+i); return toDateKey(d); });
  const MONTHS_SHORT = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];
  const DAYS_FULL = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
  const ukelisteItems = weekKeys.map((key, i) => {

}

function kalenderNav(dir) {
  kalenderMonth += dir;
  if (kalenderMonth > 11) { kalenderMonth = 0; kalenderYear++; }
  if (kalenderMonth < 0)  { kalenderMonth = 11; kalenderYear--; }
  kalenderSelectedDay = null;
  renderKalender();
}

function selectKalenderDay(key) {
  kalenderSelectedDay = kalenderSelectedDay === key ? null : key;
  renderKalender();
}

function kalenderMoveDay(delta) {
  // delta: -7=up, +7=down, -1=left, +1=right
  if (!kalenderSelectedDay) {
    // Select today if in current month, else first day
    const todayKey = toDateKey(new Date());
    const [ty, tm] = todayKey.split('-').map(Number);
    if (tm-1 === kalenderMonth && ty === kalenderYear) {
      kalenderSelectedDay = todayKey;
    } else {
      kalenderSelectedDay = kalenderYear+'-'+String(kalenderMonth+1).padStart(2,'0')+'-01';
    }
    renderKalender(); return;
  }
  const parts = kalenderSelectedDay.split('-').map(Number);
  const cur = new Date(parts[0], parts[1]-1, parts[2]);
  cur.setDate(cur.getDate() + delta);
  // If moved to different month, navigate there
  if (cur.getMonth() !== kalenderMonth || cur.getFullYear() !== kalenderYear) {
    kalenderYear  = cur.getFullYear();
    kalenderMonth = cur.getMonth();
  }
  kalenderSelectedDay = toDateKey(cur);
  renderKalender();
  // Scroll selected day into view
  setTimeout(() => {
    const el = document.querySelector('[onclick*="'+kalenderSelectedDay+'"]');
    if (el) el.scrollIntoView({block:'nearest', behavior:'smooth'});
  }, 30);
}

function modusSetToday() {
  const today = toDateKey(new Date());
  const parts = today.split('-');
  const formatted = parts[2]+'-'+parts[1]+'-'+parts[0]; // YYYY-MM-DD -> DD-MM-YYYY
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (crop) modusLogDate[crop.id] = formatted;
  renderModus();
}

function modusClearDate() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (crop) modusLogDate[crop.id] = '';
  renderModus();
}

function startModus(type, cropId) {
  const crop = crops.find(c => c.id === cropId);
  if (crop) {
    const existingLog = type === 'saa' ? crop.sowLog : crop.plantLog;
    const logType = type === 'saa' ? 'sådatoer' : 'plantedatoer';
    if (existingLog) {
      if (!confirm(`Du har allerede lagt inn en eller flere ${logType} (${existingLog}). Vil du legge inn en til?`)) return;
    }
  }
  modusType  = type;
  modusCrops = [cropId];
  modusIndex = 0;
  modusLogDate  = {};
  modusMainDate = {};
  modusNotes    = {};
  const pool = type === 'saa' ? SITATER_SAA : SITATER_PLANT;
  modusSitat = pool[Math.floor(Math.random() * pool.length)];
  renderModus();
  document.getElementById('modal-modus').style.display = 'flex';
}

function renderModus() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (!crop) return;
  const isSaa = modusType === 'saa';
  const title = isSaa ? '&#127807; Såguide' : '&#9978;&#65039; Planteguide';
  const accentColor = isSaa ? '#60a5fa' : '#34d399';
  const accentBg    = isSaa ? 'rgba(96,165,250,0.12)' : 'rgba(52,211,153,0.12)';
  const accentBorder= isSaa ? 'rgba(96,165,250,0.35)' : 'rgba(52,211,153,0.35)';
  const logDateVal = modusLogDate[crop.id] || '';
  const logDateDisplay = logDateVal || 'Velg dato 📅';

  // Use persisted quote (set once in startModus)
  const sitat = modusSitat;

  // Title first, then quote centred below
  const header = '<div style="font-size:13px;color:#6b7280;margin-bottom:14px">'+title+'</div>'
    +'<div style="text-align:center;margin-bottom:22px;padding:0 4px">'
    +'<div style="font-size:17px;color:#d1fae5;line-height:1.7;font-style:italic">«'+sitat.tekst+'»</div>'
    +'<div style="font-size:13px;color:#6b7280;margin-top:8px">['+sitat.kilde+' fra '+sitat.oversettelse+']</div>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding:14px;border-radius:12px;background:'+accentBg+';border:1px solid '+accentBorder+'">'
    +'<span style="font-size:40px">'+crop.emoji+'</span>'
    +'<div><div style="font-size:20px;color:#d1fae5;font-weight:400">'+crop.name+'</div>'
    +(crop.family ? '<div style="font-size:12px;color:#6b7280;margin-top:2px">'+crop.family+'</div>' : '')
    +'</div></div>';

  // Log date row
  const logLabel = isSaa ? 'Logg sådato' : 'Logg plantedato';
  const logSection = '<div style="margin-bottom:18px">'
    +'<div style="font-size:11px;color:#6b7280;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px">'+logLabel+'</div>'
    +'<button type="button" id="modus-date-btn" onclick="openModusDatePicker()" style="width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:'+(logDateVal?'#d1fae5':'#6b7280')+';cursor:pointer;font-size:14px;font-family:inherit;text-align:left">'+logDateDisplay+'</button>'
    +'<input type="hidden" id="modus-date-val" value="'+logDateVal+'">'
    +'</div>';

  let details = '';
  if (isSaa) {
    const plants = calcPlants(crop);
    const sownDateVal = crop.sownDate || '–';
    const infoCell = (label, val) =>
      '<div style="padding:12px;border-radius:12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08)">'
      +'<div style="font-size:10px;color:#6b7280;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:5px">'+label+'</div>'
      +'<div style="font-size:16px;color:#d1fae5">'+val+'</div>'
      +'</div>';
    details = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'
      +infoCell('Antall planter', '<span style="font-size:26px;font-weight:300">'+plants+'</span>')
      +infoCell('Sådato', sownDateVal)
      +(crop.seedsPerCluster && crop.seedsPerCluster > 1 ? infoCell('Frø per klynge', '<span style="font-size:26px;font-weight:300">'+crop.seedsPerCluster+'</span>') : '')
      +'</div>';

      +'</div>';
    details += logSection;

  const actions = '<div style="display:flex;gap:10px">'
    +'<button onclick="modusLogAndNext()" style="flex:1;padding:13px;border-radius:12px;border:1px solid '+accentBorder+';background:'+accentBg+';color:'+accentColor+';cursor:pointer;font-size:14px;font-family:inherit;font-weight:600">'+finishLabel+'</button>'
    +'</div>'
    +'<button onclick="closeModal(\'modal-modus\')" style="margin-top:10px;width:100%;padding:10px;border-radius:12px;border:1px solid rgba(255,255,255,0.08);background:transparent;color:#6b7280;cursor:pointer;font-size:12px;font-family:inherit">Avbryt</button>';

  document.getElementById('modal-modus-inner').innerHTML = header + details + actions;
}

function openModusDatePicker() {
  openCal('modus-date-btn', 'modus-date-val');
}

function openModusMainDatePicker() {
  openCal('modus-main-btn', 'modus-main-val');
}

function modusNotesChanged() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  const el = document.getElementById('modus-notes');
  if (crop && el) modusNotes[crop.id] = el.value;
}

function escapeHtml(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function modusLogAndNext() {
  const crop = crops.find(c => c.id === modusCrops[modusIndex]);
  if (crop) {
    // Read current textarea value before saving
    const notesEl = document.getElementById('modus-notes');
    if (notesEl) modusNotes[crop.id] = notesEl.value;

    const logDate = modusLogDate[crop.id] || '';
    const notes   = modusNotes[crop.id] !== undefined ? modusNotes[crop.id] : null;

    snapshot();
    if (modusType === 'saa') {
      if (notes !== null) crop.notes = notes;
      crop.sowLog = logDate;
      if (logDate) crop.status = 'sådd';
    } else {
      if (notes !== null) crop.notes = notes;
      crop.plantLog = logDate;
      if (logDate) crop.status = 'plantet';
    }
  }
  if (modusIndex < modusCrops.length - 1) {
    modusIndex++;
    renderModus();
  } else {
    closeModal('modal-modus');
    render();
    // Show "Godt jobbet!" feedback
    showModusFeedback();
  }
}

function showModusFeedback() {
  // Collect all logged dates and planned dates from this session
  const logDates   = Object.values(modusLogDate).filter(Boolean);
  const isSaa      = modusType === 'saa';

  // Build feedback based on dates
  let feedbackMsg = '';
  let earliest = null;
  if (logDates.length > 0) {
    modusCrops.forEach(id => {
      const crop = crops.find(c => c.id === id);
      const logDate = modusLogDate[id];
      if (!crop || !logDate) return;
      const planned = parseToDate(isSaa ? crop.sownDate : crop.plantedDate);
      const logged  = parseToDate(logDate);
      if (!planned || !logged) return;
      const diffDays = Math.round((logged - planned) / 86400000);
      let tier = diffDays < 0 ? 'early' : diffDays <= 7 ? 'ontime' : 'late';
      // Use worst (most generous feedback for 'early', strictest for 'late')
      if (!earliest) earliest = tier;
      else if (tier === 'late') earliest = 'late';
      else if (tier === 'early' && earliest !== 'late') earliest = 'early';
    });
    if (earliest === 'early')  feedbackMsg = '«Fattig blir den som er lat i sitt arbeid, men flittige hender gjør rik» [Ordspråkene 10,4]';
    else if (earliest === 'ontime') feedbackMsg = '«Alt er timet og tilrettelagt» [Egon Olsen]';
    else if (earliest === 'late')   feedbackMsg = '«Herren er tålmodig, og for ham er tusen år som én dag. Han er ikke sen med å oppfylle løfter, men gir tid» [2. Peter 3,8-9]';
  }

  const accentColor = isSaa ? '#60a5fa' : '#34d399';
  const accentBg    = isSaa ? 'rgba(96,165,250,0.1)' : 'rgba(52,211,153,0.1)';
  const accentBorder= isSaa ? 'rgba(96,165,250,0.3)' : 'rgba(52,211,153,0.3)';

  const feedbackIntro = !feedbackMsg ? 'Godt jobbet!'
    : earliest === 'early'  ? 'Jøss, tidlig ute!'
    : earliest === 'ontime' ? 'Perfekt! Nå er det bare en ting å si'
    : 'Null stress! Husk på at...';

  document.getElementById('modal-modus-inner').innerHTML =
    '<div style="text-align:center;padding:20px 0">'
    +'<div style="font-size:52px;margin-bottom:16px">'+(isSaa?'🌱':'🪴')+'</div>'
    +'<div style="font-size:22px;color:#d1fae5;margin-bottom:10px">'+feedbackIntro+'</div>'
    +(feedbackMsg ? '<div style="font-size:14px;color:'+accentColor+';margin-bottom:24px;line-height:1.6;font-style:italic">'+feedbackMsg+'</div>' : '<div style="margin-bottom:24px"></div>')
    +'<button onclick="closeModal(\'modal-modus\')" style="padding:13px 32px;border-radius:12px;border:1px solid '+accentBorder+';background:'+accentBg+';color:'+accentColor+';cursor:pointer;font-size:14px;font-family:inherit;font-weight:600">Lukk</button>'
    +'</div>';
  document.getElementById('modal-modus').style.display = 'flex';
}

function modusStep(dir) {
  modusIndex = Math.max(0, Math.min(modusCrops.length-1, modusIndex + dir));
  renderModus();
}
